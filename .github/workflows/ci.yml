name: "Goblin Guardian CI"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  guardian:
    name: "Goblin Guardian"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Create .codex directory
        run: mkdir -p .codex

      - name: "Goblin Guardian: Ruff Lint"
        run: ruff check .

      - name: "Goblin Guardian: Format Check"
        run: ruff format --check .

      - name: "Goblin Guardian: Publish Validation"
        run: python scripts/validate_for_publish.py --skip-tests

      - name: "Goblin Guardian: Test Gate"
        run: pytest --tb=short -q

      - name: "Goblin Guardian: Summary"
        if: always()
        run: |
          echo "## Goblin Guardian Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          for step_name in "Ruff Lint" "Format Check" "Publish Validation" "Test Gate"; do
            echo "| $step_name | See job log |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*Guardian is always watching — your coins are safe!*" >> $GITHUB_STEP_SUMMARY
